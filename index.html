// ── Neural pulse particles ──────────────────────────────────────────
const particleG = g.append('g').attr('class','pulses');
const pulses = [];
let lastSpawn = 0;
let lastFocusSpawn = 0;

function spawnPulse(focused = false) {
  let link;
  if (focused && selected) {
    const outLinks = LINKS.filter(l => {
      const sid = typeof l.source === 'object' ? l.source.id : l.source;
      return sid === selected.id;
    });
    if (!outLinks.length) return;
    link = outLinks[Math.floor(Math.random() * outLinks.length)];
  } else {
    if (!LINKS.length) return;
    link = LINKS[Math.floor(Math.random() * LINKS.length)];
  }

  const src = typeof link.source === 'object' ? link.source : NODES.find(n => n.id === link.source);
  const tgt = typeof link.target === 'object' ? link.target : NODES.find(n => n.id === link.target);
  if (!src || !tgt || src.x == null) return;

  const color = CAT_COLORS[src.cat] || '#6e7681';
  const size = focused ? 1.8 + Math.random() * 0.8 : 1.2 + Math.random() * 1.0;
  const speed = focused ? 0.005 + Math.random() * 0.004 : 0.003 + Math.random() * 0.004;
  const maxOpacity = focused ? 0.65 : 0.35;

  const el = particleG.append('circle')
    .attr('r', size)
    .attr('fill', color)
    .attr('opacity', 0)
    .style('filter', focused
      ? `drop-shadow(0 0 4px ${color})`
      : `drop-shadow(0 0 2px ${color})`);

  const waveAmp = focused ? (Math.random()-0.5)*5 : (Math.random()-0.5)*6;
  const waveFreq = 1.5 + Math.random()*2;
  pulses.push({ el, src, tgt, t: 0, speed, color, size, maxOpacity, focused, waveAmp, waveFreq });
}

function animatePulses(ts) {
  // general ambient pulses — always
  if (ts - lastSpawn > 100) { spawnPulse(false); lastSpawn = ts; }

  // focused pulses from selected node
  if (selected && ts - lastFocusSpawn > 180) { spawnPulse(true); lastFocusSpawn = ts; }
  // drag burst — pulses fire from dragged node while dragging
  if (dragging && ts - lastFocusSpawn > 90) { spawnPulse(true); lastFocusSpawn = ts; }

  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    // kill stale focused pulses when selection cleared
    if (p.focused && !selected) { p.el.remove(); pulses.splice(i, 1); continue; }

    p.t += p.speed;
    if (p.t >= 1) { p.el.remove(); pulses.splice(i, 1); continue; }

    const src = p.src, tgt = p.tgt;
    if (src.x == null || tgt.x == null) continue;

    const dx = tgt.x - src.x, dy = tgt.y - src.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const nx = -dy/len, ny = dx/len; // perpendicular
    const wave = Math.sin(p.t * Math.PI * p.waveFreq) * p.waveAmp * Math.sin(p.t * Math.PI);

    const x = src.x + dx * p.t + nx * wave;
    const y = src.y + dy * p.t + ny * wave;
    const fade = p.t < 0.12 ? p.t / 0.12 : p.t > 0.85 ? (1 - p.t) / 0.15 : 1;

    p.el.attr('cx', x).attr('cy', y).attr('opacity', fade * p.maxOpacity);
  }
  requestAnimationFrame(animatePulses);
}

sim.on('end', () => requestAnimationFrame(animatePulses));
setTimeout(() => requestAnimationFrame(animatePulses), 2500);
const legEl=document.getElementById('legend');
Object.entries(CAT_COLORS).forEach(([cat,col])=>{
  const count=NODES.filter(n=>n.cat===cat).length;
  if(!count)return;
  legEl.innerHTML+=`<div class="leg-item"><div class="leg-dot" style="background:${col}"></div>${CAT_LABEL[cat]} (${count})</div>`;
});
</script>
</body>
</html>
